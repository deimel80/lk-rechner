<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LK-Rechner</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#07111f">
</head>
<body>
<div class="container">
  <div class="hero">
    <div>
      <div class="mini">WTV / DTB</div>
      <h1>LK‑Rechner</h1>
      <p>Einzel, Doppel/Mixed, Altersklassen, Punktspiel‑Bonus und Kurzsatz‑Faktor.</p>
    </div>
    <div class="ball">LK</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="singleBtn">Einzel</button>
      <button class="tab" id="doubleBtn">Doppel / Mixed</button>
    </div>

    <div class="grid">
      <div>
        <label>Meine LK / Begleitwert</label>
        <input id="myLk" type="number" step="0.001" value="9.2">
      </div>

      <div id="partnerWrap" class="hidden">
        <label>Partner‑LK</label>
        <input id="partnerLk" type="number" step="0.001" value="10.5">
      </div>

      <div>
        <label>Gegner‑LK</label>
        <input id="opp1" type="number" step="0.001" value="6.6">
      </div>

      <div id="opp2Wrap" class="hidden">
        <label>Gegner 2 LK</label>
        <input id="opp2" type="number" step="0.001" value="9.5">
      </div>

      <div>
        <label>Altersklasse</label>
        <select id="age">
          <option>Offene Klasse</option>
          <option>Ü30</option>
          <option>Ü40</option>
          <option>Ü50</option>
          <option>Ü60</option>
        </select>
      </div>

      <div>
        <label>Zählweise</label>
        <select id="scoring">
          <option value="1">normal / MTB</option>
          <option value="0.75">Kurzsätze bis 4</option>
        </select>
      </div>
    </div>

    <label class="check"><input type="checkbox" id="bonus"> Punktspiel‑Bonus +10%</label>

    <button class="calc" id="calcBtn">Berechnen</button>

    <div class="result">
      <div class="big" id="result">–</div>
      <div class="small" id="improvement">Verbesserung –</div>
    </div>
  </div>
</div>

<div id="hype" class="hype hidden">
  <div class="hypebox">
    <div class="badge">MONSTER‑SIEG</div>
    <div class="hypeText" id="hypeText"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
